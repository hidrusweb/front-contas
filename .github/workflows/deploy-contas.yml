# Deploy Next.js (out/) → Hostinger via FTP.
# Repositório: só o contas na raiz (sem pasta hidrus-frontend-contas).
#
# Secrets / vars (paridade com deploy-admin):
#   secrets  HOSTINGER_FTP_HOST, HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD
#   vars     HOSTINGER_FTP_REMOTE_PATH_CONTAS_DEV  — pasta FTP (branch develop)
#   vars     HOSTINGER_FTP_REMOTE_PATH_CONTAS_PRD  — pasta FTP (branch main)
#   vars     NEXT_PUBLIC_API_URL_DEV  — API no build develop
#   vars     NEXT_PUBLIC_API_URL_PRD  — API no build main
#   vars     NEXT_PUBLIC_BASE_PATH (opcional) = ex: /contas
#
# dangerous-clean-slate: true apaga TUDO nessa pasta remota antes do upload — confirme o caminho.

name: Deploy Contas (Next.js)

on:
  push:
    branches: [develop, main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: deploy-contas
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secrets FTP obrigatórios
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "::error::Secrets: HOSTINGER_FTP_HOST, HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD."
            exit 1
          fi
          if [[ "$FTP_HOST" == *"://"* ]]; then
            echo "::error::HOSTINGER_FTP_HOST não pode conter ftp:// ou http(s)://. Use só o IP ou hostname."
            exit 1
          fi
          if [[ "$FTP_HOST" == *"/"* ]]; then
            echo "::error::HOSTINGER_FTP_HOST não pode ser um caminho. Use vars HOSTINGER_FTP_REMOTE_PATH_CONTAS_DEV / _PRD."
            exit 1
          fi

      # main → PRD; develop (e outras) → DEV
      - name: Pasta remota FTP por branch
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            T="${{ vars.HOSTINGER_FTP_REMOTE_PATH_CONTAS_PRD }}"
            N="HOSTINGER_FTP_REMOTE_PATH_CONTAS_PRD"
          else
            T="${{ vars.HOSTINGER_FTP_REMOTE_PATH_CONTAS_DEV }}"
            N="HOSTINGER_FTP_REMOTE_PATH_CONTAS_DEV"
          fi
          if [ -z "$T" ]; then
            echo "::error::Defina a var $N (branch: ${GITHUB_REF_NAME})."
            exit 1
          fi
          T=$(printf '%s' "$T" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          echo "HOSTINGER_FTP_REMOTE_PATH=$T" >> "$GITHUB_ENV"
          echo "FTP → $T (${GITHUB_REF_NAME})"

      - name: NEXT_PUBLIC_API_URL por branch
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            T="${{ vars.NEXT_PUBLIC_API_URL_PRD }}"
            N="NEXT_PUBLIC_API_URL_PRD"
          else
            T="${{ vars.NEXT_PUBLIC_API_URL_DEV }}"
            N="NEXT_PUBLIC_API_URL_DEV"
          fi
          if [ -z "$T" ]; then
            echo "::error::Defina a var $N (branch: ${GITHUB_REF_NAME})."
            exit 1
          fi
          T=$(printf '%s' "$T" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          D=_NEXT_PUBLIC_API_URL_VAL_
          {
            echo "NEXT_PUBLIC_API_URL<<$D"
            printf '%s\n' "$T"
            echo "$D"
          } >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_API_URL ok (${GITHUB_REF_NAME})"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      # Acelera `next build` entre runs: o Next reutiliza o que ainda é válido (mesmo lockfile).
      - name: Cache Next.js compiler
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-cache-

      - name: Install & build
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
        run: |
          npm ci
          npm run build

      - name: Deploy out via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: ${{ secrets.HOSTINGER_FTP_PORT != '' && secrets.HOSTINGER_FTP_PORT || 21 }}
          protocol: ftps
          security: loose
          timeout: 300000
          local-dir: ./out/
          server-dir: ${{ env.HOSTINGER_FTP_REMOTE_PATH }}/
          dangerous-clean-slate: true
