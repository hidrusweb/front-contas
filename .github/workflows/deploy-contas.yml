# Deploy Next.js (out/) → Hostinger via FTP.
# Repositório: só o contas na raiz (sem pasta hidrus-frontend-contas).
#
# Secrets (paridade com deploy-admin do frontend-admin):
#   HOSTINGER_FTP_HOST = só servidor FTP (IP ou hostname)
#   HOSTINGER_FTP_REMOTE_PATH_CONTAS = pasta no servidor (com /). Ex.: domains/hidrusweb.com/public_html/contas
#   Também: HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD
#   NEXT_PUBLIC_API_URL
#   NEXT_PUBLIC_BASE_PATH (opcional) = base do site se não for a raiz; ex: /contas
#
# dangerous-clean-slate: true apaga TUDO nessa pasta remota antes do upload — confirme o caminho.

name: Deploy Contas (Next.js)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: deploy-contas
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secrets FTP obrigatórios
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_REMOTE: ${{ secrets.HOSTINGER_FTP_REMOTE_PATH_CONTAS }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ] || [ -z "$FTP_REMOTE" ]; then
            echo "::error::Crie em Settings → Secrets → Actions: HOSTINGER_FTP_HOST, HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD, HOSTINGER_FTP_REMOTE_PATH_CONTAS."
            exit 1
          fi
          if [[ "$FTP_HOST" == *"://"* ]]; then
            echo "::error::HOSTINGER_FTP_HOST não pode conter ftp:// ou http(s)://. Use só o IP ou hostname."
            exit 1
          fi
          if [[ "$FTP_HOST" == *"/"* ]]; then
            echo "::error::HOSTINGER_FTP_HOST não pode ser um caminho. Coloque a pasta em HOSTINGER_FTP_REMOTE_PATH_CONTAS."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      # Acelera `next build` entre runs: o Next reutiliza o que ainda é válido (mesmo lockfile).
      - name: Cache Next.js compiler
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-cache-

      - name: Install & build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
        run: |
          npm ci
          npm run build

      - name: Deploy out via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: ${{ secrets.HOSTINGER_FTP_PORT != '' && secrets.HOSTINGER_FTP_PORT || 21 }}
          protocol: ftps
          security: loose
          timeout: 300000
          local-dir: ./out/
          server-dir: ${{ secrets.HOSTINGER_FTP_REMOTE_PATH_CONTAS }}/
          dangerous-clean-slate: true
